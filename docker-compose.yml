version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: skill_gap_analyzer_db
    restart: always
    environment:
      POSTGRES_DB: skill_gap_analyzer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
